services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fozzokosan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fozzokosan
      POSTGRES_PASSWORD: fozzokosan123
      POSTGRES_DB: fozzokosan
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fozzokosan"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fozzokosan-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  # Adminer - Database GUI
  adminer:
    image: adminer:latest
    container_name: fozzokosan-adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - postgres

  # NestJS Backend (development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fozzokosan-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://fozzokosan:fozzokosan123@postgres:5432/fozzokosan?schema=public"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"
      JWT_EXPIRES_IN: "7d"
      PORT: "3001"
      NODE_ENV: "development"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  # React + Vite Frontend (development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fozzokosan-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://backend:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
