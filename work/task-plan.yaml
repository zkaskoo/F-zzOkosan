implementation_steps:
  - step: 1
    action: "Install @types/multer as devDependency in backend"
    files: [fozzokosan/backend/package.json]
    notes: "Run: npm install --save-dev @types/multer. multer itself ships with @nestjs/platform-express. Also install @nestjs/serve-static to serve the /uploads directory as static files: npm install @nestjs/serve-static"

  - step: 2
    action: "Create uploads directory at project root and add .gitkeep"
    files: [fozzokosan/uploads/.gitkeep]
    notes: "The disk storage destination will be <project_root>/uploads/ (resolved relative to main.ts dist output). Add uploads/ to .gitignore except for .gitkeep."

  - step: 3
    action: "Create UploadService with file validation logic"
    files: [fozzokosan/backend/src/upload/upload.service.ts]
    notes: |
      - validateFile(file: Express.Multer.File): void
        - Throw BadRequestException (Hungarian message) if file.size > 5 * 1024 * 1024
        - Throw BadRequestException if mimetype not in ['image/jpeg','image/png','image/webp','image/gif']
      - getFileUrl(filename: string): string
        - Return `${process.env.BACKEND_URL ?? 'http://localhost:3001'}/uploads/${filename}`
      - Use crypto.randomUUID() for unique filename generation (done in multer config, not service)

  - step: 4
    action: "Create UploadModule with MulterModule disk storage configuration"
    files: [fozzokosan/backend/src/upload/upload.module.ts]
    notes: |
      MulterModule.register({
        storage: diskStorage({
          destination: './uploads',
          filename: (_req, file, cb) => {
            const ext = extname(file.originalname).toLowerCase();
            cb(null, `${crypto.randomUUID()}${ext}`);
          },
        }),
        limits: { fileSize: 5 * 1024 * 1024 },
        fileFilter: (_req, file, cb) => {
          const allowed = ['image/jpeg','image/png','image/webp','image/gif'];
          cb(null, allowed.includes(file.mimetype));
        },
      })

  - step: 5
    action: "Create UploadController with POST /api/uploads/image endpoint"
    files: [fozzokosan/backend/src/upload/upload.controller.ts]
    notes: |
      @Post('image')
      @UseGuards(JwtAuthGuard)
      @UseInterceptors(FileInterceptor('file'))
      uploadImage(@UploadedFile() file: Express.Multer.File) {
        this.uploadService.validateFile(file);
        return { url: this.uploadService.getFileUrl(file.filename) };
      }
      Response shape: { url: string }
      HTTP 201 on success, 400 on validation failure, 401 if unauthenticated.

  - step: 6
    action: "Register UploadModule and ServeStaticModule in AppModule"
    files: [fozzokosan/backend/src/app.module.ts]
    notes: |
      ServeStaticModule.forRoot({
        rootPath: join(__dirname, '..', '..', 'uploads'),
        serveRoot: '/uploads',
        exclude: ['/api/(.*)'],
      })
      Add UploadModule to imports array.

  - step: 7
    action: "Write backend unit tests"
    files:
      - fozzokosan/backend/src/upload/upload.service.spec.ts
      - fozzokosan/backend/src/upload/upload.controller.spec.ts
    notes: "Mock file objects with size and mimetype properties. Test guard metadata with Reflector."

  - step: 8
    action: "Create frontend uploadService"
    files: [fozzokosan/frontend/src/services/uploadService.ts]
    notes: |
      export async function uploadImage(file: File, token: string): Promise<string> {
        const formData = new FormData();
        formData.append('file', file);
        const response = await axios.post('/api/uploads/image', formData, {
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'multipart/form-data' },
          onUploadProgress: (progressEvent) => { /* optional callback parameter */ },
        });
        return response.data.url as string;
      }
      If there is an auth store (Zustand) expose a version that reads token from store.

  - step: 9
    action: "Create ImageUpload React component"
    files: [fozzokosan/frontend/src/components/upload/ImageUpload.tsx]
    notes: |
      Props interface:
        onUpload: (url: string) => void
        currentImageUrl?: string
        label?: string          // defaults to "Kép feltöltése"
        disabled?: boolean

      Behavior:
        - Drag-and-drop zone + hidden <input type="file"> triggered on click
        - accept="image/jpeg,image/png,image/webp,image/gif"
        - On file selection: call uploadImage, show linear progress (0-100%)
        - On success: show preview <img> and call onUpload(url)
        - On error: show Hungarian error message ("A feltöltés sikertelen. Ellenőrizd a fájl méretét és formátumát.")
        - While uploading show "Feltöltés..." text and disable zone
        - All visible strings in Hungarian
      Styling: Tailwind CSS classes (tailwindcss 4 is already installed in frontend)

  - step: 10
    action: "Write frontend component tests"
    files: [fozzokosan/frontend/src/components/upload/ImageUpload.test.tsx]
    notes: |
      Requires: @testing-library/react, @testing-library/user-event, vitest.
      Check if these are already in devDependencies; if not they need installing.
      Tests:
        - renders drop zone with default Hungarian label
        - renders preview img when currentImageUrl passed
        - calls onUpload with URL returned by uploadImage mock
        - shows progress indicator during upload
        - shows Hungarian error message when uploadImage rejects

