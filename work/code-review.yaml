  - type: STYLE
    severity: MINOR
    file: fozzokosan/backend/src/upload/upload.module.ts
    line: 31
    description: >
      `cb(new Error(...) as any, false)` — the `as any` cast suppresses a
      TypeScript unsafe-argument warning. Multer's fileFilter callback
      expects the first argument as `Error | null`. Pass `null` on success
      and a typed `new MulterError` or a plain `new Error` without the cast.
      Consider creating a custom `BadRequestException`-derived error or using
      multer's own `MulterError` class so the global exception filter can
      surface it correctly.
    fix_agent: developer

  - type: STYLE
    severity: MINOR
    file: fozzokosan/backend/src/upload/upload.controller.spec.ts
    line: 45
    description: >
      Two `@typescript-eslint/no-unsafe-argument` warnings for passing
      `undefined as any` to `controller.uploadImage()`. Use an explicit
      overload or type the parameter properly in the test (e.g.,
      `undefined as unknown as Express.Multer.File`) to satisfy strict mode
      without suppressing type safety.
    fix_agent: developer

  - type: SECURITY
    severity: MAJOR
    file: fozzokosan/backend/src/upload/upload.module.ts
    line: 15
    description: >
      Filename extension is taken directly from `file.originalname` using
      `extname()`. A client can send `originalname: "shell.php\0.jpg"` — on
      some systems the null-byte truncates the name server-side. Additionally,
      MIME sniffing bypass: the `fileFilter` validates `file.mimetype` which
      is set by the client header, not by inspecting the file's actual magic
      bytes. A malicious actor can upload a PHP/HTML file with a
      `Content-Type: image/jpeg` header and bypass the filter.
      Recommendation: (1) whitelist only known-safe extensions (.jpg, .jpeg,
      .png, .webp, .gif) derived from the validated MIME type rather than
      trusting `originalname`; (2) consider integrating `file-type` or
      `mmmagic` to validate magic bytes server-side.
    fix_agent: security-tester

  - type: SECURITY
    severity: MINOR
    file: fozzokosan/backend/src/app.module.ts
    line: 17
    description: >
      `ServeStaticModule` serves the entire `uploads/` directory with no
      auth guard. Any uploaded file is publicly accessible to anyone with
      its URL. For a recipe-sharing app this may be intentional, but it
      should be a conscious decision documented in the task. If images
      should be private, static serving should be replaced with a guarded
      streaming endpoint.
    fix_agent: developer

  - type: ARCHITECTURE
